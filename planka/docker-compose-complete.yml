services:
  planka:
    image: ghcr.io/plankanban/planka:latest
    container_name: planka
    restart: unless-stopped
    ports:
      - "3001:1337"
    environment:
      - BASE_URL=http://100.78.55.14:3001
      - DATABASE_URL=postgresql://planka:planka@postgres:5432/planka
      - SECRET_KEY=${PLANKA_SECRET_KEY:-change-this-secret-key-in-production}
      - TRUST_PROXY=1
      - REGISTRATION_ENABLED=true
      - DEFAULT_ADMIN_EMAIL=admin@h3cke.de
      - DEFAULT_ADMIN_PASSWORD=admin123
      - DEFAULT_ADMIN_USERNAME=admin
      - DEFAULT_ADMIN_NAME=Administrator
    volumes:
      - planka-user-avatars:/app/public/user-avatars
      - planka-project-background-images:/app/public/project-background-images
      - planka-attachments:/app/private/attachments
      - ./custom.css:/tmp/custom.css:ro
      - ./init.sh:/tmp/init.sh:ro
    entrypoint: ["/bin/sh", "-c", "cp /tmp/custom.css /app/public/custom.css && sed -i 's|</head>|<link rel=\"stylesheet\" href=\"<%- basePath %>/custom.css\" />\\n</head>|g' /app/views/index.ejs && node server.js"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - planka-network

  postgres:
    image: postgres:15-alpine
    container_name: planka-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=planka
      - POSTGRES_USER=planka
      - POSTGRES_PASSWORD=planka
    volumes:
      - planka-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planka -d planka"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - planka-network

volumes:
  planka-user-avatars:
  planka-project-background-images:
  planka-attachments:
  planka-postgres-data:

networks:
  planka-network:
    driver: bridge
