services:
  planka-init:
    image: ghcr.io/plankanban/planka:latest
    container_name: planka-init
    restart: "no"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Wait for database to be ready
        sleep 10
        # Copy custom CSS to public directory
        cp /tmp/custom.css /app/public/custom.css
        # Inject CSS link into index.html
        sed -i 's|</head>|<link rel="stylesheet" href="/custom.css" />\n</head>|g' /app/public/index.html
        echo "Custom CSS injected"
    volumes:
      - ./custom.css:/tmp/custom.css:ro
      - planka-public:/app/public
    networks:
      - planka-network
    depends_on:
      postgres:
        condition: service_healthy

  planka:
    image: ghcr.io/plankanban/planka:latest
    container_name: planka
    restart: unless-stopped
    ports:
      - "3001:1337"
    environment:
      - BASE_URL=http://100.78.55.14:3001
      - DATABASE_URL=postgresql://planka:planka@postgres:5432/planka
      - SECRET_KEY=${PLANKA_SECRET_KEY:-change-this-secret-key-in-production}
      - TRUST_PROXY=1
      - REGISTRATION_ENABLED=true
      - DEFAULT_ADMIN_EMAIL=admin@h3cke.de
      - DEFAULT_ADMIN_PASSWORD=admin123
      - DEFAULT_ADMIN_USERNAME=admin
      - DEFAULT_ADMIN_NAME=Administrator
    volumes:
      - planka-user-avatars:/app/public/user-avatars
      - planka-project-background-images:/app/public/project-background-images
      - planka-attachments:/app/private/attachments
      - planka-public:/app/public
    depends_on:
      planka-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - planka-network

  postgres:
    image: postgres:15-alpine
    container_name: planka-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=planka
      - POSTGRES_USER=planka
      - POSTGRES_PASSWORD=planka
    volumes:
      - planka-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planka -d planka"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - planka-network

volumes:
  planka-user-avatars:
  planka-project-background-images:
  planka-attachments:
  planka-postgres-data:
  planka-public:

networks:
  planka-network:
    driver: bridge
