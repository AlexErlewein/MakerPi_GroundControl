# Litestream configuration for MakerPi GroundControl database backups.
# Deployed to Pi via: sudo bash scripts/setup-litestream.sh
# Copies this file to /etc/litestream.yml on the Pi.

dbs:
  - path: /home/dev/Code/MakerPi_GroundControl/auth.db
    replicas:
      - type: s3
        endpoint: s3.eu-central-003.backblazeb2.com
        bucket: h3ckePiDatabase
        path: groundcontrol/auth
        access-key-id: 003616c7fded3aa0000000001
        secret-access-key: K003p61zKkoqHf4fKPKbcPCiDD5eb+4
        retention: 168h
        snapshot-interval: 1h

