# Mosquitto Configuration for MakerPi GroundControl
# Place this file in /etc/mosquitto/mosquitto.conf

# Basic settings
listener 1883
allow_anonymous true

# Persistence
persistence true
persistence_location /var/lib/mosquitto/

# Logging (verbose for development, reduce for production)
log_dest file /var/log/mosquitto/mosquitto.log
log_type all
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# Connection settings
max_connections -1
max_queued_messages 1000

# Message size
message_size_limit 0

# Keepalive
keepalive_interval 60

# Optional: Enable WebSocket support (requires additional setup)
# listener 9001
# protocol websockets
