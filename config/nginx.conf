# Nginx reverse proxy for MakerPi GroundControl
# Managed by scripts/setup-https.sh
# Deployed to: /etc/nginx/sites-available/groundcontrol
# Port 443 is used by Plane Docker proxy; GroundControl uses 8443.
# HTTP on 8082 redirects to HTTPS on 8443.
#
# Dual certificate setup:
# - Local IPs (192.168.x.x): mkcert self-signed certificates
# - Tailscale domain (*.ts.net): Tailscale HTTPS certificates (Let's Encrypt)

# HTTP to HTTPS redirect
server {
    listen 8082;
    listen [::]:8082;
    return 301 https://$host:8443$request_uri;
}

# Local IP access (mkcert certificates)
server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    server_name _;  # Catch-all for local IPs and hostname

    ssl_certificate     /etc/ssl/groundcontrol/cert.pem;
    ssl_certificate_key /etc/ssl/groundcontrol/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Permissions-Policy "camera=*";

    # Main app (uvicorn on port 8000)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }

    # Docs app (uvicorn on port 8001)
    location /docs/ {
        proxy_pass         http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Prefix /docs;
    }
}

# Tailscale HTTPS access (Tailscale certificates)
# This block will be dynamically included by setup-https.sh if Tailscale certificates are available
# TAILSCALE_HTTPS_BLOCK
