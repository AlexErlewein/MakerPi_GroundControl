# Nginx reverse proxy for MakerPi GroundControl
# Managed by scripts/setup-https.sh
# Deployed to: /etc/nginx/sites-available/groundcontrol
# Port 443 is used by Plane Docker proxy; GroundControl uses 8443.

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;

    ssl_certificate     /etc/ssl/groundcontrol/cert.pem;
    ssl_certificate_key /etc/ssl/groundcontrol/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Main app (uvicorn on port 8000)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }

    # Docs app (uvicorn on port 8001)
    location /docs/ {
        proxy_pass         http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
