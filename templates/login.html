{% extends "base.html" %}

{% block title %}MakerPi GroundControl{% endblock %}

{% block extra_css %}
<style>
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: var(--bg-primary);
        padding: 20px;
    }

    .login-card {
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 40px 36px;
        width: 100%;
        max-width: 380px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 24px;
    }

    .login-logo {
        height: 72px;
        width: auto;
        filter: brightness(1.6);
    }

    .login-title {
        font-size: 1.1rem;
        color: var(--text-secondary);
        margin: 0;
        text-align: center;
    }

    .login-form {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 14px;
    }

    .login-form label {
        display: block;
        font-size: 0.85rem;
        color: var(--text-secondary);
        margin-bottom: 4px;
    }

    .login-form input {
        width: 100%;
        padding: 10px 12px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        color: var(--text-primary);
        font-size: 1rem;
        outline: none;
        box-sizing: border-box;
    }

    .login-form input:focus {
        border-color: var(--accent);
    }

    .login-btn {
        width: 100%;
        padding: 11px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 4px;
    }

    .login-btn:hover {
        opacity: 0.88;
    }

    .login-error {
        width: 100%;
        background: rgba(248, 81, 73, 0.12);
        border: 1px solid var(--danger);
        border-radius: 6px;
        color: var(--danger);
        font-size: 0.9rem;
        padding: 10px 12px;
        text-align: center;
    }

    .login-footer {
        font-size: 0.82rem;
        color: var(--text-secondary);
        margin-top: 8px;
    }

    .login-footer a {
        color: var(--accent);
        text-decoration: none;
    }

    .login-footer a:hover {
        text-decoration: underline;
    }

    .toggle-login-btn {
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        margin-top: 12px;
    }

    .toggle-login-btn:hover {
        background: var(--bg-tertiary);
        color: var(--text-primary);
    }

    .guest-tile {
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 24px;
        width: 100%;
        text-align: center;
        margin-top: 16px;
    }

    .guest-tile h3 {
        margin: 0 0 16px 0;
        font-size: 1.2rem;
        color: var(--text-primary);
    }

    .guest-tile .btn {
        width: 100%;
        padding: 12px;
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
    }

    .guest-tile .btn:hover {
        opacity: 0.88;
    }

    /* Inline form for iOS Safari Guided Access compatibility */
    .guest-form-inline {
        margin: 0;
        padding: 0;
        display: block;
    }
    .guest-form-inline button {
        font-family: inherit;
    }

    .hidden {
        display: none;
    }

    .gc-site-footer {
        display: none;
    }

</style>
{% endblock %}

{% block content %}
<div class="login-card">
    <img src="/graphics/H3ckeLogo.svg" class="login-logo" alt="H3cke MakerSpace">
    <p class="login-title">GroundControl Admin</p>

    {% if error %}
    <div class="login-error">{{ error }}</div>
    {% endif %}

    <button id="toggle-login-btn" class="toggle-login-btn" onclick="toggleLoginForm()">🔐 Mit Passwort anmelden</button>

    <form id="login-form" class="login-form hidden" method="post" action="/login">
        <div>
            <label for="username">Benutzername</label>
            <input type="text" id="username" name="username" autocomplete="username" required>
        </div>
        <div>
            <label for="password">Passwort</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="login-btn">Anmelden</button>
    </form>

    <div class="guest-tile">
        <h3>Neu hier?</h3>
        <button type="button" class="btn" id="guest-btn">Gäste-Laufzettel</button>
    </div>

    <p class="login-footer">
        <a href="/docs/" target="_blank">Dokumentation</a>
        &middot;
        <a href="https://h3cke.de/policies/privacy-policy" target="_blank" rel="noopener">Datenschutz</a>
        &middot;
        <a href="https://h3cke.de/policies/legal-notice" target="_blank" rel="noopener">Impressum</a>
    </p>
</div>

<script>
function toggleLoginForm() {
    const form = document.getElementById('login-form');
    const btn = document.getElementById('toggle-login-btn');
    form.classList.toggle('hidden');
    if (form.classList.contains('hidden')) {
        btn.textContent = '🔐 Mit Passwort anmelden';
    } else {
        btn.textContent = '✕ Abbrechen';
        document.getElementById('username').focus();
    }
}

// iOS PWA SPA-style navigation - load content without actual URL change
document.getElementById('guest-btn').addEventListener('click', async function(e) {
    e.preventDefault();
    try {
        const response = await fetch('/guest/laufzettel?new=1');
        const html = await response.text();
        // Replace document content
        document.open();
        document.write(html);
        document.close();
        // Update URL without triggering navigation
        history.replaceState({}, '', '/guest/laufzettel?new=1');
    } catch (err) {
        console.error('Navigation failed:', err);
    }
});
</script>
{% endblock %}
