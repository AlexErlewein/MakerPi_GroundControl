<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MakerPi GroundControl</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>(function(){var t=localStorage.getItem('gc-theme')||'dark';document.documentElement.setAttribute('data-theme',t==='light'?'light':'');})();</script>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <a href="/dashboard"><img src="/graphics/H3ckeLogo.svg" class="site-logo" alt="H3cke MakerSpace"></a>
                <nav class="nav">
                    <a href="/dashboard" class="nav-link active">Dashboard</a>
                    <a href="/database" class="nav-link">Devices</a>
                    <a href="/tags" class="nav-link">NFC-Tags</a>
                    <a href="/laufzettel" class="nav-link">Laufzettel</a>
                    <a href="/katalog" class="nav-link">Katalog</a>
                    <a href="/buchhaltung" class="nav-link">Buchhaltung</a>
                    <a href="/mitglieder" class="nav-link">Mitglieder</a>
                    <a href="/admin/users" class="nav-link">Benutzer</a>
                    <a href="{{ request.url.scheme }}://{{ request.url.hostname }}:8001" class="nav-link" target="_blank">Docs</a>
                </nav>
            </div>
            <div class="header-actions">
                <a href="/logout" class="btn btn-secondary">Abmelden</a>
            </div>
        </header>

        <main>
            <section class="stats">
                <div class="stat-card">
                    <h3><a href="/laufzettel" class="stat-link">Offene Laufzettel</a></h3>
                    <p class="stat-value" id="open-laufzettel-count">-</p>
                </div>
                <div class="stat-card">
                    <h3><a href="/database" class="stat-link">Offline Devices</a></h3>
                    <p class="stat-value" id="offline-devices-count">-</p>
                </div>
            </section>
            <section class="section" style="text-align:center; padding: 60px 20px;">
                <h1 style="font-size:2rem; margin-bottom:12px;">MakerPi GroundControl</h1>
                <p style="color:var(--text-secondary); font-size:1.1rem; margin-bottom:24px;">Admin Dashboard</p>
                <div class="status" id="status" style="justify-content:center;">
                    <span class="status-dot" id="status-dot"></span>
                    <span id="status-text">Connecting...</span>
                </div>
            </section>
        </main>

        <footer>
            <p>MakerPi GroundControl v0.1.0</p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/theme.js"></script>
    <button id="theme-toggle" class="theme-toggle" title="Light Mode">☀️</button>
</body>
</html>
