{% extends "base.html" %}

{% block header %}
<div class="container">
    <header>
        <div class="header-left">
            <a href="/dashboard"><img src="/graphics/H3ckeLogo.svg" class="site-logo" alt="H3cke MakerSpace"></a>
            <nav class="nav">
                <a href="/dashboard" class="nav-link{% if nav_active == 'dashboard' %} active{% endif %}">Dashboard</a>
                <a href="/database" class="nav-link{% if nav_active == 'devices' %} active{% endif %}">Devices</a>
                <a href="/tags" class="nav-link{% if nav_active == 'tags' %} active{% endif %}">NFC-Tags</a>
                <a href="/laufzettel" class="nav-link{% if nav_active == 'laufzettel' %} active{% endif %}">Laufzettel</a>
                <a href="/katalog" class="nav-link{% if nav_active == 'katalog' %} active{% endif %}">Katalog</a>
                <a href="/buchhaltung" class="nav-link{% if nav_active == 'buchhaltung' %} active{% endif %}">Buchhaltung</a>
                <a href="/mitglieder" class="nav-link{% if nav_active == 'mitglieder' %} active{% endif %}">Mitglieder</a>
                <a href="/admin/users" class="nav-link{% if nav_active == 'users' %} active{% endif %}">Benutzer</a>
                <a href="{{ request.url.scheme }}://{{ request.url.hostname }}:8001" class="nav-link" target="_blank">Docs</a>
            </nav>
        </div>
        <div class="header-actions">
            <span style="color:var(--text-secondary);font-size:0.85rem;padding-right:4px;">{{ current_user }}</span>
            <a href="/logout" class="btn btn-secondary">Abmelden</a>
        </div>
    </header>
{% endblock %}

{% block footer %}
    <footer>
        <p>MakerPi GroundControl v0.1.0</p>
    </footer>
</div>
{% endblock %}
