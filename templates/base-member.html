{% extends "base.html" %}

{% block header %}
<div class="container">
    <header>
        <div class="header-left">
            <a href="/member"><img src="/graphics/H3ckeLogo.svg" class="site-logo" alt="H3cke MakerSpace"></a>
            <nav class="nav">
                <button type="button" class="nav-link{% if nav_active == 'auftrag' %} active{% endif %}" onclick="window.location.href='/member'">Auftrag</button>
                <button type="button" class="nav-link{% if nav_active == 'konto' %} active{% endif %}" onclick="window.location.href='/member/konto'">Mein Konto</button>
                <button type="button" class="nav-link{% if nav_active == 'historie' %} active{% endif %}" onclick="window.location.href='/member/laufzettel/historie'">Historie</button>
                <button type="button" class="nav-link" onclick="window.location.href='/logout'">Abmelden</button>
            </nav>
        </div>
        <div class="header-right">
            <span class="user-info">Angemeldet als: {{ user.username }}</span>
            <div id="admin-bar" style="display: none;">
                <button id="admin-unlock-btn" class="btn btn-admin">🔓 Admin-Bereich</button>
            </div>
            <div id="admin-verified" style="display: none;">
                <a href="/dashboard" class="btn btn-admin">&#128274; Admin-Dashboard</a>
                <button onclick="exitAdminMode()" class="btn btn-secondary">&#128274; Beenden</button>
            </div>
        </div>
    </header>
{% endblock %}

{% block content %}{% endblock %}

{% block footer %}
</div>
{% endblock %}
