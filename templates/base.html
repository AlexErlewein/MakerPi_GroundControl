<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0d1117">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GroundControl">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" type="image/svg+xml" href="/graphics/H3ckeLogo.svg">
    <link rel="apple-touch-icon" href="/graphics/H3ckeLogo.svg">
    <title>{% block title %}MakerPi GroundControl{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block extra_css %}{% endblock %}
    <script>(function(){var t=localStorage.getItem('gc-theme')||'dark';document.documentElement.setAttribute('data-theme',t==='light'?'light':'');})();</script>
    {% block extra_head %}{% endblock %}
</head>
<body{% block body_attrs %}{% endblock %}>
    {% block header %}{% endblock %}

    {% block content %}{% endblock %}

    {% block footer %}{% endblock %}

    {% block extra_js %}{% endblock %}
    <a href="/bug-report" class="bug-report-link" title="Bug melden">🐛</a>
    <script src="/static/js/theme.js"></script>
    <script src="/static/js/pwa.js"></script>
    <button id="theme-toggle" class="theme-toggle" title="Light Mode">{% block theme_icon %}☀️{% endblock %}</button>
    <style>
        .bug-report-link {
            position: fixed;
            bottom: 1rem;
            left: 1rem;
            font-size: 1.3rem;
            opacity: 0.45;
            text-decoration: none;
            z-index: 900;
            transition: opacity 0.2s;
        }
        .bug-report-link:hover { opacity: 1; }
    </style>
</body>
</html>
