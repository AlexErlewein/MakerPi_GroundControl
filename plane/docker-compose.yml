services:
  web:
    image: makeplane/plane-web:stable
    container_name: plane-web
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://100.78.55.14:3001/api
      - NEXT_PUBLIC_DEPLOY_URL=http://100.78.55.14:3001
    depends_on:
      - api
      - worker
    networks:
      - plane-network

  api:
    image: makeplane/plane-backend:stable
    container_name: plane-api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://plane:plane@db:5432/plane
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-for-production}
      - REDIS_URL=redis://redis:6379/
      - CORS_ALLOWED_ORIGINS=http://100.78.55.14:3001
      - DEFAULT_FROM_EMAIL=admin@h3cke.de
      - USE_MINIO=false
    depends_on:
      - db
      - redis
    networks:
      - plane-network

  worker:
    image: makeplane/plane-worker:stable
    container_name: plane-worker
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://plane:plane@db:5432/plane
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key-for-production}
      - REDIS_URL=redis://redis:6379/
      - DEFAULT_FROM_EMAIL=admin@h3cke.de
    depends_on:
      - db
      - redis
      - api
    networks:
      - plane-network

  db:
    image: postgres:15-alpine
    container_name: plane-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=plane
      - POSTGRES_PASSWORD=plane
      - POSTGRES_DB=plane
    volumes:
      - plane-db-data:/var/lib/postgresql/data
    networks:
      - plane-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plane -d plane"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: plane-redis
    restart: unless-stopped
    volumes:
      - plane-redis-data:/data
    networks:
      - plane-network

volumes:
  plane-db-data:
  plane-redis-data:

networks:
  plane-network:
    driver: bridge
